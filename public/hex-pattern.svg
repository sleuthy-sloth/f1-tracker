<svg xmlns="http://www.w3.org/2000/svg" width="60" height="52" viewBox="0 0 60 52">
  <defs>
    <pattern id="hex-grid" width="60" height="52" patternUnits="userSpaceOnUse">
      <!-- Pointy-top hexagon at (15, 17): radius=17 center=(15,17) -->
      <path d="M15 0l15 9v17l-15 9-15-9V9z" fill="none" stroke="#fff" stroke-width="0.5" stroke-opacity="0.08"/>
      <!-- Pointy-top hexagon at (45, 17) -->
      <path d="M45 0l15 9v17l-15 9-15-9V9z" fill="none" stroke="#fff" stroke-width="0.5" stroke-opacity="0.08"/>
      <!-- Pointy-top hexagon at (30, 43) -->
      <path d="M30 26l15 9v17l-15 9-15-9V35z" fill="none" stroke="#fff" stroke-width="0.5" stroke-opacity="0.08"/>
      <!-- Edge hexagons for seamless tiling at x=0 and x=60 -->
      <path d="M0 9l15-9v17l-15 9V9z" fill="none" stroke="#fff" stroke-width="0.5" stroke-opacity="0.08"/>
      <path d="M60 9l-15-9v17l15 9V9z" fill="none" stroke="#fff" stroke-width="0.5" stroke-opacity="0.08"/>
      <path d="M0 35l15 9v17l-15-9V35z" fill="none" stroke="#fff" stroke-width="0.5" stroke-opacity="0.08"/>
      <path d="M60 35l-15 9v17l15-9V35z" fill="none" stroke="#fff" stroke-width="0.5" stroke-opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#hex-grid)"/>
</svg>
